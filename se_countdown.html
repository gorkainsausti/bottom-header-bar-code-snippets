<script>
(function() {
  var end = new Date(2026, 6, 28, 23, 59, 59);
  function tick() {
    var diff = end - Date.now();
    if (diff < 0) diff = 0;
    var sec = Math.floor(diff / 1000);
    var days = Math.floor(sec / 86400); sec %= 86400;
    var hrs = Math.floor(sec / 3600); sec %= 3600;
    var mins = Math.floor(sec / 60); sec %= 60;
    var text = days + "d " + hrs + "h " + mins + "m " + sec + "s";
    document.querySelectorAll(".sale-cd-timer").forEach(function(el) {
      el.textContent = text;
    });
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
