  <div class="extra-menu show-mobile" style="background-color:#83bb24;">
    <p style="margin:0; font-size:12px; color:#ffffff; text-align:center; line-height:1.35;">
      <span style="display:block;">
      <strong style="color:#ffffff;">6%</strong> code 
      <strong style="background-color:#ffffff; color:#83bb24; padding:1px 5px; border-radius:3px; font-family:monospace;">QDAYS6</strong>

      </a>

      <span style="display:block;color:#ffffff !important;">Se termine dans :&nbsp;<span class="qdays-cd-timer" style="color:#ffffff !important;font-variant-numeric:tabular-nums;"></span></span>
    </p>
  </div>
  
<script>
(function() {
  var end = new Date(2026, 5, 30, 23, 59, 59);
  function tick() {
    var diff = end - Date.now();
    if (diff < 0) diff = 0;
    var sec = Math.floor(diff / 1000);
    var days = Math.floor(sec / 86400); sec %= 86400;
    var hrs = Math.floor(sec / 3600); sec %= 3600;
    var mins = Math.floor(sec / 60); sec %= 60;
    var text = days + "d " + hrs + "h " + mins + "m " + sec + "s";
    document.querySelectorAll(".qdays-cd-timer").forEach(function(el) {
      el.textContent = text;
    });
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
